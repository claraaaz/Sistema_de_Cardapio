<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Bienal|Menu</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f4f4
        }

        header {
            display: flex;
            justify-content: space-between;
            padding: 20px 30px
        }

        .logo {
            color: #6b5147
        }

        .logo h1 {
            margin: 0
        }

        .cart {
            cursor: pointer;
            background: #8a6a5a;
            color: #fff;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative
        }

        .cart span {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #fff;
            color: #000;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        h2 {
            text-align: center
        }

        .cats {
            text-align: center
        }

        .cats button,
        .finish {
            cursor: pointer;
            margin: 4px;
            padding: 10px 18px;
            border: 0;
            border-radius: 8px;
            background: #7a5b4b;
            color: #fff
        }

        .wrap {
            max-width: 950px;
            margin: auto;
            padding: 10px 18px 90px
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #cbc0b1;
            margin: 14px 0;
            padding: 14px;
            border-radius: 8px
        }

        .left {
            display: flex;
            gap: 14px;
            align-items: center
        }

        .left img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover
        }

        .plus {
            font-size: 38px;
            cursor: pointer
        }

        
.s-3{
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 80px;
    background-color: #5E2208;

    display: flex;
    justify-content: space-around;
    align-items: center;
}


.s-3 a{
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: none;
    background-color: #8A6754;

    display: flex;
    align-items: center;
    justify-content: center;
}

.s-3 img{
    width: 20px;
}



.s-3 a:hover {
     box-shadow: 0 4px 10px rgba(0,0,0,0.3);
     transform: translateY(-20px);
     background-color: black;
     
    
}

.s-3 h6{
    color: white;
    margin-top: 4px;
    text-align: center;

}




.s-4{
    background-color: #532B19;
    margin-top: auto;
    height: 10vh;
}

       
        #modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .5);
            align-items: center;
            justify-content: center
        }

        .box {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 420px
        }

        #toast {
            display: none;
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: #222;
            color: #fff;
            padding: 10px 15px;
            border-radius: 6px
        }
    </style>
</head>

<body>
    <div id="toast"></div>
    <header>
        <div class="logo">
            <img src="src/assets/images/logo.png" alt="">
        </div>
        <div class="cart" onclick="location.href='carrinho.html'">🛒<span id="count">0</span></div>
    </header>
    <h2 id="num-mesa">Carregando mesa...</h2>
    <div class="cats">
        <button onclick="filterCat('all')">Todos</button>
        <button onclick="filterCat('meal')">Almoço</button>
        <button onclick="filterCat('bread')">Pães</button>
        <button onclick="filterCat('sweet')">Sobremesas</button>
        <button onclick="filterCat('drink')">Bebidas</button>
    </div>
    <div class="wrap">
        <div class="item" data-cat="meal">
            <div class="left"><img src="https://images.unsplash.com/photo-1544025162-d76694265947?w=200">
                <div>Prato Feito<br>R$ 20,00</div>
            </div>
            <div class="plus" onclick="add('Prato Feito',20)">+</div>
        </div>
        <div class="item" data-cat="bread">
            <div class="left"><img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?w=200">
                <div>Pão Artesanal<br>R$ 12,00</div>
            </div>
            <div class="plus" onclick="add('Pão Artesanal',12)">+</div>
        </div>
        <div class="item" data-cat="sweet">
            <div class="left"><img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=200">
                <div>Bolo Chocolate<br>R$ 18,00</div>
            </div>
            <div class="plus" onclick="add('Bolo Chocolate',18)">+</div>
        </div>
        <div class="item" data-cat="drink">
            <div class="left"><img src="https://images.unsplash.com/photo-1622597467836-f3285f2131b8?w=200">
                <div>Suco Natural<br>R$ 10,00</div>
            </div>
            <div class="plus" onclick="add('Suco Natural',10)">+</div>
        </div>
        <div style="text-align:right;margin-top:25px"><button class="finish" onclick="finish()">Finalizar</button></div>
    </div>
        
        <div class="s-3"> 
            <div>
             <a href="mesa.html"><img src="/src/assets/images/casa.png" alt=""> </a> 
            <h6>ínicio</h6>
            </div>

            <div>
             <a href="menu.html"><img src="/src/assets/images/garfoefaca.png" alt=""></a> 
            <h6>Menu</h6>
            </div>

            <div>
             <a href="categoria.html"><img src="/src/assets/images/cardapio.png" alt=""></a> 
            <h6>Categorias</h6>
            </div>
            
           <div> 
             <a href="carrinho.html"><img src="/src/assets/images/carrinho.png" alt=""></a> 
            <h6>Carrinho</h6>
        </div>
          
        </div>

       


    <div id="modal">
        <div class="box">
            <h3>Carrinho</h3>
            <div id="list"></div>
            <p id="total"></p><button onclick="closeCart()">Fechar</button>
        </div>
    </div>
    <script>
        var cart = [];
        function msg(t) { var x = document.getElementById('toast'); x.innerHTML = t; x.style.display = 'block'; setTimeout(function () { x.style.display = 'none' }, 1200); }
        
        // alteração do carrinhi feita pela clara
         function add(n, p) { 
    cart.push({ n: n, p: p }); 
    document.getElementById('count').innerHTML = cart.length; 
    localStorage.setItem('carrinhoItens', JSON.stringify(cart));
    
    msg('Adicionado: ' + n); 
}

        function openCart() { var l = document.getElementById('list'); var total = 0; l.innerHTML = ''; for (var i = 0; i < cart.length; i++) { l.innerHTML += cart[i].n + ' - R$ ' + cart[i].p + ',00<br>'; total += cart[i].p; } if (cart.length == 0) { l.innerHTML = 'Carrinho vazio'; } document.getElementById('total').innerHTML = 'Total: R$ ' + total + ',00'; document.getElementById('modal').style.display = 'flex'; }
        function closeCart() { document.getElementById('modal').style.display = 'none'; }
        function finish() { if (cart.length == 0) { msg('Carrinho vazio'); return; } cart = []; document.getElementById('count').innerHTML = '0'; closeCart(); msg('Pedido finalizado'); }
        function filterCat(c) { var items = document.querySelectorAll('.item'); for (var i = 0; i < items.length; i++) { items[i].style.display = (c == 'all' || items[i].getAttribute('data-cat') == c) ? 'flex' : 'none'; } }


       
window.onload = function() {
  
    var salvo = localStorage.getItem('carrinhoItens');
    if (salvo) {
        cart = JSON.parse(salvo);
        document.getElementById('count').innerHTML = cart.length;
    }

   
    const urlParams = new URLSearchParams(window.location.search);
    const categoriaDaUrl = urlParams.get('cat'); 

    if (categoriaDaUrl) {
        filterCat(categoriaDaUrl); 
    }
};


function finish() { 
    if (cart.length == 0) { 
        msg('Seu carrinho está vazio!'); 
        return; 
    } 
  
    location.href = 'carrinho.html'; 
}


window.onload = function() {
    
    var mesa = localStorage.getItem('mesaSelecionada');
    
   
    if (mesa) {
        document.getElementById('num-mesa').innerHTML = "Mesa " + mesa;
    }
    
  
}
    </script>
</body>

</html>
