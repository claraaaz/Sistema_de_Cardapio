    <!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Bienal|Pagamento</title>

<style>

body {
    margin: 0;
    font-family: Arial;
}


.logo {
    padding: 20px;
}


.metodos {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}


.container{
    
    padding:30px;
    border-radius:10px;
  
    text-align:center;
}

h2{text-align: center;
    margin-bottom:20px;
}

.option{
    border:1px solid #ccc;
    padding:20px;
    width: 20vw;
    margin:10px 0;
    border-radius:15px;
    cursor:pointer;
}

.option:hover{
    background:#775645;
}

.selected{

    background:#5a250d;
    color:white;
    border:none;
}

button{
    
    
   
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#5a250d;
    color:white;
    cursor:pointer;
}
</style>

</head>
<body>
    <div class="logo">
        <img src="src/assets/images/logo.png" alt="">
    </div>
    
    <div class="metodos">
        <div class="container">
            <h2>Método de Pagamento</h2>
    
            <div class="option"> <h3>Cartão Débito</h3></div>
            <div class="option"> <h3>Cartão Crédito</h3></div>
            <div class="option"><h3>PIX</h3></div>
            <div class="option"><h3>Dinheiro</h3></div>
    
            <button>Selecionar</button>
        </div>
    </div>

<script>
let metodoSelecionado = "";

function selecionar(e, metodo){
    metodoSelecionado = metodo;

    // remove seleção antiga
    document.querySelectorAll(".option").forEach(el => {
        el.classList.remove("selected");
    });

    // adiciona no clicado
    e.target.classList.add("selected");
}

function continuar(){
    if(metodoSelecionado === ""){
        alert("Escolha um método!");
        return;
    }

    localStorage.setItem("pagamento", metodoSelecionado);

    if(metodoSelecionado === "pix"){
        window.location.href = "pix.html";
    } else {
        finalizarDireto();
    }
}

function finalizarDireto(){
    alert("Pagamento realizado com sucesso!");
    localStorage.clear();
    window.location.href = "index.html";
}
</script>

</body>
</html>
