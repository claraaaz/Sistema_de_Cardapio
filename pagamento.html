    <!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Bienal|Pagamento</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background-color:#5a250d;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#f5f5f5;
    padding:30px;
    border-radius:10px;
    width:350px;
    text-align:center;
}

h2{
    margin-bottom:20px;
}

.option{
    border:1px solid #ccc;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    cursor:pointer;
}

.option:hover{
    background:#ddd;
}

.selected{
    background:#5a250d;
    color:white;
    border:none;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#5a250d;
    color:white;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="container">
    <h2>Método de Pagamento</h2>

    <div class="option" onclick="selecionar(event, 'debito')">Cartão Débito</div>
    <div class="option" onclick="selecionar(event, 'credito')">Cartão Crédito</div>
    <div class="option" onclick="selecionar(event, 'pix')">PIX</div>
    <div class="option" onclick="selecionar(event, 'dinheiro')">Dinheiro</div>

    <button onclick="continuar()">Selecionar</button>
</div>

<script>
let metodoSelecionado = "";

function selecionar(e, metodo){
    metodoSelecionado = metodo;

    // remove seleção antiga
    document.querySelectorAll(".option").forEach(el => {
        el.classList.remove("selected");
    });

    // adiciona no clicado
    e.target.classList.add("selected");
}

function continuar(){
    if(metodoSelecionado === ""){
        alert("Escolha um método!");
        return;
    }

    localStorage.setItem("pagamento", metodoSelecionado);

    if(metodoSelecionado === "pix"){
        window.location.href = "pix.html";
    } else {
        finalizarDireto();
    }
}

function finalizarDireto(){
    alert("Pagamento realizado com sucesso!");
    localStorage.clear();
    window.location.href = "index.html";
}
</script>

</body>
</html>
